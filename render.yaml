services:
  - type: web
    name: kkb-bot
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install --omit=dev
    startCommand: node --enable-source-maps ./packages/bot/dist/bot/src/bot.js
    
    # Health check
    healthCheckPath: /health
    
    # Port configuration
    envVars:
      - key: WS_PORT
        value: "8080"
      - key: HTTP_PORT
        value: "3000"
      - key: NODE_ENV
        value: production
      - key: GIF_STORAGE_PATH
        value: /var/data/gifs
    
    # Persistent disk for GIFs
    disk:
      name: gifs-storage
      mountPath: /var/data/gifs
      sizeGB: 10

databases:
  - name: kkb-bot-db
    databaseName: kkb_bot
    user: kkb_user
    region: oregon
    plan: standard
    postgresMajorVersion: "15"
